name: Extract Apprentice Plus ZIP

on:
  push:
    paths:
      - "apprentice-plus.zip"

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract ZIP
        run: |
          unzip -o apprentice-plus.zip -d .

      - name: Delete ZIP
        run: rm -f apprentice-plus.zip

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Extract ZIP"
          git push
